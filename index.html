function toMin(t){var p=t.split(":");return +p[0]*60+ +p[1];}
function parseRange(str){var m=str.match(/(\d{1,2}:\d{2})/g);if(!m||m.length<2)return null;return{s:toMin(m[0]),e:toMin(m[1])};}
function getConflicts(cid,ids){
  var a=COURSES.find(function(c){return c.id===cid;});if(!a)return[];
  return ids.filter(function(id){return id!==cid;}).flatMap(function(id){
    var b=COURSES.find(function(c){return c.id===id;});if(!b)return[];
    var dates=a.schedule.filter(function(sa){
      return b.schedule.some(function(sb){
        if(sa.date!==sb.date)return false;
        var ra=parseRange(sa.time),rb=parseRange(sb.time);
        return ra&&rb&&ra.s<rb.e&&rb.s<ra.e;
      });
    }).map(function(s){return s.date;});
    return dates.length?[{course:b,dates:dates}]:[];
  });
}
function fmtMD(s){var p=s.split("-");return p[1]+"/"+p[2];}
function pad(n){return String(n).padStart(2,"0");}
function schedSummary(sch){
  var days=[...new Set(sch.map(function(s){return s.day;}))].join("·");
  var ev=sch.some(function(s){return parseInt(s.time)>=18;});
  var am=sch.some(function(s){return parseInt(s.time)<12&&parseInt(s.time)>=6;});
  var pm=sch.some(function(s){return parseInt(s.time)>=12&&parseInt(s.time)<18;});
  return days+" / "+[ev?"야간":"",am?"오전":"",pm?"오후":""].filter(Boolean).join("+");
}

function el(tag,attrs,children){
  attrs=attrs||{};children=Array.isArray(children)?children:(children?[children]:[]);
  var e=document.createElement(tag);
  Object.keys(attrs).forEach(function(k){
    var v=attrs[k];if(v==null)return;
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.indexOf("on")===0)e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  });
  children.forEach(function(c){
    if(c==null||c===false)return;
    e.append(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}

      ]),
      el("div",{style:{marginBottom:"20px"}},[
        el("div",{style:{fontSize:"12px",color:"#555",marginBottom:"6px"}},"강의 평가 (선택 · 들어봤다면)"),
        el("div",{class:"rwrap"},RATINGS.map(function(r){
          return el("button",{class:"rbtn",style:{background:G.addForm.rating===r?c.color:"#f0f0f0",color:G.addForm.rating===r?"#fff":"#555"},
            onClick:function(){G.addForm.rating=G.addForm.rating===r?"":r;render();}},r);
        }))
      ]),
      el("div",{class:"brow"},[
        el("button",{class:"btn bs",onClick:function(){G.addModal=null;render();}},"취소"),
        el("button",{class:"btn",style:{background:c.color,color:"#fff",fontWeight:"700"},onClick:doAdd},"수강계획에 담기")
      ])
    ])
  ]);
}

function render(){
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML="";
  app.append(
    el("div",{class:"hdr"},[
      el("div",{class:"hdr-top"},[
        el("div",{},[
          el("div",{style:{color:"#fff",fontWeight:"800",fontSize:"15px"}},"KAIST MBA"),
          el("div",{style:{color:"#8fa8d8",fontSize:"11px"}},"2026 여름학기 수강계획 공유")
        ]),
        G.user
          ?el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[
              el("span",{style:{color:"#a0c4ff",fontSize:"12px"}},G.user.name),
              el("button",{style:{background:"rgba(255,255,255,.13)",color:"#ccc",borderRadius:"14px",fontSize:"11px",padding:"4px 10px",border:"none",cursor:"pointer",fontFamily:"inherit"},onClick:doLogout},"로그아웃")
            ])
          :el("button",{style:{background:"#4F86C6",color:"#fff",borderRadius:"16px",fontSize:"12px",padding:"6px 14px",border:"none",cursor:"pointer",fontFamily:"inherit"},onClick:function(){G.showLogin=true;render();}},"이름 등록")
      ]),
      el("div",{class:"nav"},[
        ["courses","📚 과목"],["calendar","📅 달력"],["members","👥 원우"],["all","🏫 전체과정"]
      ].map(function(arr){return el("button",{class:G.view===arr[0]?"on":"",onClick:function(){G.view=arr[0];render();}},arr[1]);}))
    ]),
    el("div",{class:"body"},[
      el("div",{class:"banner"},[
        el("div",{style:{fontSize:"11px",color:"#8fa8d8"}},"수강신청까지"),
        el("div",{style:{fontSize:"20px",fontWeight:"800"}},["D-5 ",el("span",{style:{fontSize:"13px",fontWeight:"400",color:"#a0c4ff"}},"5.26(화) 12:30 시작")]),
        el("div",{style:{fontSize:"10px",color:"#8fa8d8",marginTop:"2px"}},"추첨: 5.26 → 결과발표: 5.28 12:00 → 선착순: 5.28~5.29")
      ]),
      G.view==="courses"?renderCourses():G.view==="calendar"?renderCalendar():G.view==="members"?renderMembers():renderAll()
    ]),
    renderGuestModal(),
    renderLoginModal(),
    renderAddModal(),
    G.toast?el("div",{class:"toast"},G.toast):el("span",{})
  );
}

// ── 시작 ──────────────────────────────────────────────
loadLocal();
render();
syncFromServer();
</script>
</body>
</html>
