// ── 유틸 ──────────────────────────────────────────────
function toMin(t){const[h,m]=t.split(":");return+h*60+ +m;}
function parseRange(str){const m=str.match(/(\d{1,2}:\d{2})/g);if(!m||m.length<2)return null;return{s:toMin(m[0]),e:toMin(m[1])};}
function getConflicts(cid,ids){
  const a=COURSES.find(c=>c.id===cid);if(!a)return[];
  return ids.filter(id=>id!==cid).flatMap(id=>{
    const b=COURSES.find(c=>c.id===id);if(!b)return[];
    const dates=a.schedule.filter(sa=>b.schedule.some(sb=>{
      if(sa.date!==sb.date)return false;
      const ra=parseRange(sa.time),rb=parseRange(sb.time);
      return ra&&rb&&ra.s<rb.e&&rb.s<ra.e;
    })).map(s=>s.date);
    return dates.length?[{course:b,dates}]:[];
  });
}
function fmtMD(s){const p=s.split("-");return p[1]+"/"+p[2];}
function pad(n){return String(n).padStart(2,"0");}

// ── Firebase ──────────────────────────────────────────
async function save(data){
  try{ await setDoc(DOC, data); return true; }
  catch(e){ alert("저장 오류: "+e.message); return false; }
}

async function commit(fn){
  if(S.busy) return;
  S.busy=true;
  const next={ users:[...S.data.users.map(u=>({...u}))], selections:[...S.data.selections.map(s=>({...s}))] };
  fn(next);
  S.data=next;
  render();
  await save(next);
  S.busy=false;
  render();
}

  S.toast=msg; render();
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toastTimer=setTimeout(()=>{S.toast="";render();},2400);
}

// ── 액션 ──────────────────────────────────────────────
async function doLogin(){
  const{program,cohort,name}=S.loginForm; if(!name.trim())return;
  const uid=[program,cohort,name.trim()].join("|");
  const u={id:uid,program,cohort,name:name.trim()};
  await commit(d=>{ if(!d.users.find(x=>x.id===uid)) d.users.push(u); });
  S.user=u; try{localStorage.setItem("ku",JSON.stringify(u));}catch(e){}
  S.showLogin=false; toast(u.name+"님, 환영합니다!");
}
function doLogout(){ S.user=null; try{localStorage.removeItem("ku");}catch(e){} render(); }
async function doAdd(){
  const cid=S.addModal.courseId;
  await commit(d=>{ if(!d.selections.find(s=>s.userId===S.user.id&&s.courseId===cid)) d.selections.push({userId:S.user.id,courseId:cid,reason:S.addForm.reason,rating:S.addForm.rating,addedAt:new Date().toISOString()}); });
  S.addModal=null; toast("수강계획에 추가했습니다!");
}
async function doRemove(cid){
  await commit(d=>{ const i=d.selections.findIndex(s=>s.userId===S.user.id&&s.courseId===cid); if(i>=0)d.selections.splice(i,1); });
  toast("수강계획에서 제거했습니다.");
}
async function doField(cid,field,val){
  await commit(d=>{ const s=d.selections.find(s=>s.userId===S.user.id&&s.courseId===cid); if(s)s[field]=val; });
  toast("저장했습니다.");
}

// ── 셀렉터 ────────────────────────────────────────────
const myIds=()=>S.user?S.data.selections.filter(s=>s.userId===S.user.id).map(s=>s.courseId):[];
const isSel=cid=>myIds().includes(cid);
const getSels=cid=>S.data.selections.filter(s=>s.courseId===cid);
const getMySel=cid=>S.user?S.data.selections.find(s=>s.userId===S.user.id&&s.courseId===cid):null;
const getUser=id=>S.data.users.find(u=>u.id===id);

// ── DOM 헬퍼 ──────────────────────────────────────────
function el(tag, attrs, children){
  attrs=attrs||{}; children=children||[];
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of (Array.isArray(children)?children:[children])){
    if(c==null||c===false) continue;
    e.append(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}

// ── 렌더 함수들 ───────────────────────────────────────
function renderHeader(){
  return el("div",{class:"header"},[
    el("div",{class:"header-top"},[
      el("div",{},[
        el("div",{style:{color:"#fff",fontWeight:"800",fontSize:"15px"}},"KAIST MBA"),
        el("div",{style:{color:"#8fa8d8",fontSize:"11px"}},"2026 여름학기 수강계획 공유"),
      ]),
      S.user
        ? el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[
            el("span",{style:{color:"#a0c4ff",fontSize:"12px"}},S.user.name),
            el("button",{style:{background:"rgba(255,255,255,.13)",color:"#ccc",borderRadius:"14px",fontSize:"11px",padding:"4px 10px"},onClick:doLogout},"로그아웃"),
          ])
        : el("button",{style:{background:"#4F86C6",color:"#fff",borderRadius:"16px",fontSize:"12px",padding:"6px 14px"},onClick:()=>{S.showLogin=true;render();}},"로그인"),
    ]),
    el("div",{class:"nav"},[
      ["courses","📚 과목"],["calendar","📅 달력"],["members","👥 원우"],["all","🏫 전체과정"]
    ].map(([v,l])=>el("button",{class:S.view===v?"active":"",onClick:()=>{S.view=v;render();}},l))),
  ]);
}

function renderCard(course){
  const sels=getSels(course.id), sel=isSel(course.id);
  const ids=myIds();
  const pct=course.capacity?Math.round(sels.length/course.capacity*100):null;
  const expanded=S.expanded===course.id;
  const mySel=getMySel(course.id);
  const cf=sel?getConflicts(course.id,ids):[];

  return el("div",{class:"card",style:{border:sel?"2px solid "+course.color:"1.5px solid #eee",boxShadow:sel?"0 2px 12px "+course.color+"33":"0 1px 4px rgba(0,0,0,.06)"}},[
    el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px"}},[
      el("div",{style:{flex:"1",cursor:"pointer"},onClick:()=>{S.expanded=expanded?null:course.id;render();}},[
        el("div",{style:{display:"flex",alignItems:"center",gap:"5px",flexWrap:"wrap"}},[
          el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#222"}},course.name),
          course.cross?el("span",{class:"badge",style:{background:"#f0e6ff",color:"#7b4fb5"}},"타과정"):null,
          el("span",{class:"badge",style:{background:(WC[course.weeks]||"#888")+"22",color:WC[course.weeks]||"#888"}},course.weeks),
          el("span",{class:"badge",style:{background:"#f0f0f0",color:"#555"}},schedSummary(course.schedule)),
          cf.length?el("span",{class:"badge",style:{background:"#fff0f0",color:"#d00"}},"⚠ 시간겹침"):null,
        ]),
        el("div",{style:{fontSize:"11px",color:"#888",marginTop:"2px"}},course.code+" | "+course.professor+" 교수"),
        el("div",{style:{fontSize:"11px",color:"#aaa"}},course.eligibility),
      ]),
      el("button",{
        style:{background:sel?course.color:"#f0f0f0",color:sel?"#fff":"#555",borderRadius:"20px",fontSize:"12px",padding:"5px 12px",fontWeight:"600",flexShrink:"0",border:"none",cursor:"pointer"},
        onClick:()=>{ if(sel){ doRemove(course.id); } else { S.addForm={reason:"",rating:""}; S.addModal={courseId:course.id}; render(); } }
      }, sel?"✓ 담음":"+ 담기"),
    ]),
    cf.length?el("div",{class:"conflict-box"},[
      el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#c00",marginBottom:"3px"}},"⚠ 아래 과목과 시간이 겹쳐요"),
      ...cf.map(c=>el("div",{style:{fontSize:"11px",color:"#c00"}},"· "+c.course.name+" ("+c.dates.map(fmtMD).join(", ")+")"))
    ]):null,
    el("div",{style:{marginTop:"10px"}},[
      el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}},[
        el("span",{style:{fontSize:"11px",color:"#555"}},["관심인원 ",el("b",{},[String(sels.length)+"명"])]),
        course.capacity?el("span",{style:{fontSize:"11px",color:"#999"}},"정원 "+course.capacity+"명"+(pct!==null?" ("+pct+"%)":"")):null,
      ]),
      course.capacity?el("div",{class:"progress-bar"},[
        el("div",{class:"progress-fill",style:{width:Math.min(pct,100)+"%",background:pct>80?"#e03":pct>50?"#f5a623":course.color}}),
      ]):null,
    ]),
    expanded?el("div",{style:{marginTop:"12px",borderTop:"1px solid #f0f0f0",paddingTop:"12px"}},[
      el("div",{style:{marginBottom:"10px"}},[
        el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#555",marginBottom:"5px"}},"📅 강의 일정"),
        el("div",{class:"schedule-wrap"},course.schedule.map(sc=>
          el("div",{class:"chip",style:{background:course.color+"15",color:course.color,borderColor:course.color+"44"}},fmtMD(sc.date)+"("+sc.day+") "+sc.time)
        )),
        course.remarks?el("div",{style:{fontSize:"10px",color:"#e07b54",marginTop:"5px"}},"⚠ "+course.remarks):null,
      ]),
      el("div",{style:{marginBottom:"10px"}},[
        el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#555",marginBottom:"5px"}},"👥 참여 예정자 ("+sels.length+"명)"),
        sels.length===0
          ?el("div",{style:{fontSize:"11px",color:"#bbb"}},"아직 없어요!")
          :el("div",{},sels.map(s=>{
              const u=getUser(s.userId); if(!u)return null;
              return el("div",{class:"member-card"},[
                el("div",{style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}},[
                  el("span",{style:{fontSize:"12px",fontWeight:"600",color:"#222"}},u.name),
                  el("span",{style:{fontSize:"10px",color:"#888"}},u.program+" "+u.cohort),
                  s.rating?el("span",{style:{fontSize:"10px",background:"#f0f0f0",borderRadius:"6px",padding:"1px 6px"}},s.rating):null,
                ]),
                s.reason?el("div",{style:{fontSize:"11px",color:"#555",marginTop:"3px"}},"💬 "+s.reason):null,
              ]);
            })),
      ]),
      S.user&&sel&&mySel?el("div",{style:{background:"#f8f8f8",borderRadius:"10px",padding:"10px"}},[
        el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#555",marginBottom:"8px"}},"✏️ 내 정보 수정"),
        el("div",{style:{marginBottom:"8px"}},[
          el("div",{style:{fontSize:"11px",color:"#666",marginBottom:"4px"}},"수강 이유 / 메모"),
          (()=>{const ta=document.createElement("textarea");ta.placeholder="이 과목을 담은 이유나 메모 (선택)";ta.value=mySel.reason||"";ta.addEventListener("blur",e=>doField(course.id,"reason",e.target.value));return ta;})(),
        ]),
        el("div",{},[
          el("div",{style:{fontSize:"11px",color:"#666",marginBottom:"5px"}},"강의 평가"),
          el("div",{class:"rating-wrap"},RATINGS.map(r=>
            el("button",{class:"rating-btn",style:{background:mySel.rating===r?course.color:"#eee",color:mySel.rating===r?"#fff":"#555"},onClick:()=>doField(course.id,"rating",mySel.rating===r?"":r)},r)
          )),
        ]),
      ]):null,
    ]):null,
  ]);
}

function renderCourses(){
  return el("div",{},[
    el("div",{style:{fontSize:"12px",color:"#888",marginBottom:"10px"}},"총 "+COURSES.length+"개 과목 | "+(S.user?"내 수강계획: "+myIds().length+"과목":"로그인하면 수강계획을 저장할 수 있어요")),
    ...COURSES.map(renderCard),
  ]);
}

function renderCalendar(){
  const y=S.calYear,m=S.calMonth;
  const days=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay();
  const ms=y+"-"+pad(m+1);
  const ids=S.user?myIds():COURSES.map(c=>c.id);
  return el("div",{},[
    el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}},[
      el("button",{style:{background:"#eee",color:"#333",borderRadius:"8px",padding:"6px 12px"},onClick:()=>{if(m===0){S.calYear--;S.calMonth=11;}else S.calMonth--;render();}},"◀"),
      el("b",{style:{fontSize:"15px"}},y+"년 "+(m+1)+"월"),
      el("button",{style:{background:"#eee",color:"#333",borderRadius:"8px",padding:"6px 12px"},onClick:()=>{if(m===11){S.calYear++;S.calMonth=0;}else S.calMonth++;render();}},"▶"),
    ]),
    el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"4px"}},[
      ...["일","월","화","수","목","금","토"].map((d,i)=>el("div",{style:{textAlign:"center",fontSize:"11px",fontWeight:"700",color:i===0?"#e03":i===6?"#47a":"#666",padding:"2px 0"}},d)),
      ...Array.from({length:fd},()=>el("div",{})),
      ...Array.from({length:days},(_,i)=>{
        const d=i+1,ds=ms+"-"+pad(d);
        const cs=COURSES.filter(c=>ids.includes(c.id)&&c.schedule.some(s=>s.date===ds));
        const isReg=ds>="2026-05-26"&&ds<="2026-05-29";
        const di=(fd+d-1)%7;
        return el("div",{style:{minHeight:"54px",background:isReg?"#fffbe6":"#fff",border:isReg?"1.5px solid #f5c518":"1px solid #eee",borderRadius:"6px",padding:"2px 3px"}},[
          el("div",{style:{fontSize:"11px",color:di===0?"#e03":di===6?"#47a":"#333",fontWeight:isReg?"700":"400"}},String(d)),
          isReg?el("div",{style:{fontSize:"8px",color:"#b8860b"}},"수강신청"):null,
          ...cs.slice(0,3).map(c=>el("div",{style:{fontSize:"8px",background:c.color,color:"#fff",borderRadius:"3px",padding:"1px 2px",marginTop:"1px",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}},c.name)),
          cs.length>3?el("div",{style:{fontSize:"8px",color:"#999"}},"+"+String(cs.length-3)):null,
        ]);
      }),
    ]),
    el("div",{style:{fontSize:"11px",color:"#999",marginTop:"6px"}},[
      S.user?"내 수강계획 과목만 표시":"전체 과목 표시",
      el("span",{style:{marginLeft:"8px",background:"#fffbe6",border:"1px solid #f5c518",borderRadius:"3px",padding:"1px 5px"}},"수강신청기간"),
    ]),
  ]);
}

function renderAll(){
  const depts=["전체",...new Set(ALL_COURSES.map(c=>c.dept))];
  const filtered=S.allDept==="전체"?ALL_COURSES:ALL_COURSES.filter(c=>c.dept===S.allDept);
  return el("div",{},[
    el("div",{style:{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px"}},
      depts.map(d=>el("button",{
        style:{fontSize:"11px",padding:"4px 10px",borderRadius:"14px",border:"1px solid #ddd",background:S.allDept===d?"#1a2540":"#fff",color:S.allDept===d?"#fff":"#555",cursor:"pointer"},
        onClick:()=>{S.allDept=d;render();}
      },d))
    ),
    el("div",{style:{fontSize:"12px",color:"#888",marginBottom:"10px"}},filtered.length+"개 과목"),
    ...filtered.map(c=>{
      const dc=DC[c.dept]||"#888",wc=WC[c.weeks]||"#888";
      return el("div",{class:"card"},[
        el("div",{style:{display:"flex",alignItems:"center",gap:"5px",flexWrap:"wrap",marginBottom:"4px"}},[
          el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#222"}},c.name),
          el("span",{class:"badge",style:{background:dc+"22",color:dc}},c.dept),
          el("span",{class:"badge",style:{background:wc+"22",color:wc}},c.weeks),
          el("span",{class:"badge",style:{background:"#f0f0f0",color:"#555"}},c.days+" / "+c.time),
        ]),
        el("div",{style:{fontSize:"11px",color:"#888"}},c.code+" | "+c.professor+" 교수"),
        c.capacity?el("div",{style:{fontSize:"11px",color:"#aaa"}},"정원 "+c.capacity+"명"):null,
        el("div",{style:{fontSize:"10px",color:"#e07b54",marginTop:"3px"}},c.remarks),
      ]);
    }),
  ]);
}

function renderMembers(){
  const withSel=S.data.users.filter(u=>S.data.selections.some(s=>s.userId===u.id));
  if(!withSel.length) return el("div",{style:{textAlign:"center",color:"#bbb",padding:"40px"}},"아직 수강계획을 등록한 원우가 없어요.");
  return el("div",{},withSel.map(u=>{
    const sels=S.data.selections.filter(s=>s.userId===u.id);
    return el("div",{class:"card"},[
      el("div",{style:{fontWeight:"700",fontSize:"14px",color:"#222"}},u.name),
      el("div",{style:{fontSize:"11px",color:"#888",marginBottom:"8px"}},u.program+" "+u.cohort),
      el("div",{style:{display:"flex",flexWrap:"wrap",gap:"5px"}},sels.map(s=>{
        const c=COURSES.find(x=>x.id===s.courseId);
        return c?el("span",{style:{fontSize:"11px",background:c.color+"22",color:c.color,borderRadius:"6px",padding:"3px 8px",border:"1px solid "+c.color+"44",fontWeight:"600"}},c.name):null;
      })),
    ]);
  }));
}

function renderLoginModal(){
  if(!S.showLogin) return el("span",{});
  return el("div",{class:"modal-overlay",onClick:e=>{if(e.target===e.currentTarget){S.showLogin=false;render();}}},[
    el("div",{class:"modal"},[
      el("div",{style:{fontWeight:"800",fontSize:"16px",marginBottom:"16px",color:"#1a2540"}},"내 정보 입력"),
      ...[["소속 과정","program",PROGRAMS],["기수","cohort",COHORTS]].map(([label,key,opts])=>
        el("div",{style:{marginBottom:"12px"}},[
          el("div",{style:{fontSize:"12px",color:"#555",marginBottom:"4px"}},label),
          (()=>{
            const s=document.createElement("select");
            Object.assign(s.style,{width:"100%",padding:"9px 12px",borderRadius:"10px",border:"1.5px solid #ddd",fontSize:"14px"});
            opts.forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;if(o===S.loginForm[key])op.selected=true;s.append(op);});
            s.addEventListener("change",e=>S.loginForm[key]=e.target.value);
            return s;
          })(),
        ])
      ),
      el("div",{style:{marginBottom:"18px"}},[
        el("div",{style:{fontSize:"12px",color:"#555",marginBottom:"4px"}},"이름"),
        (()=>{
          const inp=document.createElement("input");inp.type="text";inp.placeholder="실명을 입력해주세요";
          Object.assign(inp.style,{width:"100%",padding:"9px 12px",borderRadius:"10px",border:"1.5px solid #ddd",fontSize:"14px"});
          inp.value=S.loginForm.name;
          inp.addEventListener("input",e=>S.loginForm.name=e.target.value);
          inp.addEventListener("keydown",e=>e.key==="Enter"&&doLogin());
          return inp;
        })(),
      ]),
      el("div",{class:"btn-row"},[
        el("button",{class:"btn btn-secondary",onClick:()=>{S.showLogin=false;render();}},"취소"),
        el("button",{class:"btn btn-primary",style:{opacity:S.loginForm.name.trim()?"1":"0.4"},onClick:doLogin},"입력 완료"),
      ]),
    ]),
  ]);
}

function renderAddModal(){
  if(!S.addModal) return el("span",{});
  const c=COURSES.find(x=>x.id===S.addModal.courseId); if(!c) return el("span",{});
  return el("div",{class:"modal-overlay",onClick:e=>{if(e.target===e.currentTarget){S.addModal=null;render();}}},[
    el("div",{class:"modal"},[
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}},[
        el("div",{style:{width:"10px",height:"10px",borderRadius:"50%",background:c.color,flexShrink:"0"}}),
        el("div",{style:{fontWeight:"800",fontSize:"15px",color:"#1a2540"}},c.name),
      ]),
      el("div",{style:{marginBottom:"14px"}},[
        el("div",{style:{fontSize:"12px",color:"#555",marginBottom:"5px"}},"수강 이유 / 메모 (선택)"),
        (()=>{const ta=document.createElement("textarea");ta.placeholder="왜 이 과목을 담으려고 하나요?";ta.value=S.addForm.reason;Object.assign(ta.style,{width:"100%",padding:"10px",borderRadius:"10px",border:"1.5px solid #ddd",fontSize:"13px",minHeight:"70px",resize:"vertical"});ta.addEventListener("input",e=>S.addForm.reason=e.target.value);return ta;})(),
      ]),
      el("div",{style:{marginBottom:"20px"}},[
        el("div",{style:{fontSize:"12px",color:"#555",marginBottom:"6px"}},"강의 평가 (선택 · 들어봤다면)"),
        el("div",{class:"rating-wrap"},RATINGS.map(r=>
          el("button",{class:"rating-btn",style:{background:S.addForm.rating===r?c.color:"#f0f0f0",color:S.addForm.rating===r?"#fff":"#555"},onClick:()=>{S.addForm.rating=S.addForm.rating===r?"":r;render();}},r)
        )),
      ]),
      el("div",{class:"btn-row"},[
        el("button",{class:"btn btn-secondary",onClick:()=>{S.addModal=null;render();}},"취소"),
        el("button",{class:"btn",style:{background:c.color,color:"#fff",fontWeight:"700"},onClick:doAdd},"수강계획에 담기"),
      ]),
    ]),
  ]);
}

function render(){
  const app=document.getElementById("app");
  if(!app) return;
  app.innerHTML="";
  app.append(
    renderHeader(),
    el("div",{class:"content"},[
      el("div",{class:"banner"},[
        el("div",{style:{fontSize:"11px",color:"#8fa8d8"}},"수강신청까지"),
        el("div",{style:{fontSize:"20px",fontWeight:"800"}},["D-5 ",el("span",{style:{fontSize:"13px",fontWeight:"400",color:"#a0c4ff"}},"5.26(화) 12:30 시작")]),
        el("div",{style:{fontSize:"10px",color:"#8fa8d8",marginTop:"2px"}},"추첨: 5.26 → 결과발표: 5.28 12:00 → 선착순: 5.28~5.29"),
      ]),
      S.view==="courses"?renderCourses():S.view==="calendar"?renderCalendar():S.view==="members"?renderMembers():renderAll(),
    ]),
    renderLoginModal(),
    renderAddModal(),
    S.toast?el("div",{class:"toast"},S.toast):el("span",{}),
  );
}

// ── 데이터 바인딩 및 안전한 초기화 ───────────────────────
try {
  onSnapshot(DOC, snap=>{
    if(snap.exists()){
      const d=snap.data();
      S.data={ users:Array.isArray(d.users)?d.users:[], selections:Array.isArray(d.selections)?d.selections:[] };
    } else {
      S.data={users:[],selections:[]};
    }
    render();
  }, err => {
    console.error("Firestore 에러 발생:", err);
    render();
    toast("데이터를 불러오지 못했습니다. (보안 규칙 확인 필요)");
  });
} catch(e) {
  console.error(e);
  render();
}

// 최초 1회 즉시 실행하여 '불러오는 중'을 제거
render();
</script>

</html>
