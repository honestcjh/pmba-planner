<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<!-- 💡 모바일 브라우저 상단 상태바 색상을 헤더 남색과 일치시켜 아이콘이 흰색으로 보이게 만듭니다 -->
<meta name="theme-color" content="#1a2540"/>
<title>KAIST MBA 수강계획</title>
<style>
/* 💡 상하좌우 여백을 완전히 없애고 모바일 화면에 밀착시킵니다 */
*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #1a2540; /* 💡 화면 바깥 여백이 튀지 않도록 헤더와 같은 톤으로 베이스를 깝니다 */
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  padding: 0;
  margin: 0;
}
button {
  cursor: pointer;
  font-family: inherit;
  border: none;
}
textarea, input, select {
  font-family: inherit;
}

/* 💡 메인 컨테이너: 상하좌우 여백을 없애고 꽉 차게 만듭니다 */
#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  width: 100%;
  max-width: 500px; /* 💡 데스크탑에서 볼 때만 모바일 크기로 고정 */
  margin: 0 auto;
  background: #f6f7fb; /* 💡 실제 앱 콘텐츠 배경색 */
  box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

.header {
  background: #1a2540;
  padding: 16px 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.nav {
  display: flex;
  gap: 4px;
}
.nav button {
  flex: 1;
  padding: 8px 0;
  background: transparent;
  color: #8fa8d8;
  font-size: 12px;
  border-radius: 10px 10px 0 0;
}
.nav button.active {
  background: #4F86C6;
  color: #fff;
  font-weight: 700;
}
.content {
  padding: 14px;
  flex: 1;
}
.banner {
  background: linear-gradient(135deg, #1a2540, #2d4a8a);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 14px;
  color: #fff;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1.5px solid #eee;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.badge {
  font-size: 9px;
  border-radius: 4px;
  padding: 1px 5px;
  font-weight: 600;
}
.progress-bar {
  background: #f0f0f0;
  border-radius: 6px;
  height: 7px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 6px;
  transition: width .4s;
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: flex-end;
}
.modal {
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 24px;
  width: 100%;
}
.chip {
  font-size: 10px;
  border-radius: 5px;
  padding: 3px 7px;
  border-width: 1px;
  border-style: solid;
}
.member-card {
  background: #f8f8f8;
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a2540;
  color: #fff;
  border-radius: 20px;
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  white-space: nowrap;
}
.conflict-box {
  margin-top: 8px;
  background: #fff0f0;
  border-radius: 8px;
  padding: 6px 10px;
  border: 1px solid #fcc;
}
.schedule-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
input, select, textarea {
  width: 100%;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1.5px solid #ddd;
  font-size: 14px;
  outline: none;
}
textarea {
  resize: vertical;
  min-height: 70px;
  font-size: 13px;
  padding: 10px;
}
.btn-row {
  display: flex;
  gap: 8px;
}
.btn {
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  flex: 1;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
.btn-primary {
  background: #1a2540;
  color: #fff;
  font-weight: 700;
}
.btn-secondary {
  background: #f0f0f0;
  color: #555;
}
.rating-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.rating-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 16px;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
</style>
</head>
